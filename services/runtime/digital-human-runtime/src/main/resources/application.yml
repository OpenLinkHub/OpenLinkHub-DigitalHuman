server:
  port: 8080

spring:
  application:
    name: digital-human-runtime
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  profiles:
    active: prod

dashscope:
  funasr:
    model: fun-asr-realtime
    format: pcm
    sample-rate: 16000
    chunk-size-bytes: 3200
    frame-interval-ms: 100
    callback-timeout-seconds: 60
    disfluency-removal-enabled: false
  tts:
    enabled: true
    model: cosyvoice-v3.5-plus
    voice: cosyvoice-v3.5-plus-bailian-32ebf457e9394a56aea45a9af920fe23
    format: MP3_22050HZ_MONO_256KBPS
    volume: 50
    speech-rate: 1.0
    pitch-rate: 1.0
    timeout-seconds: 60

lightrag:
  base-url: http://127.0.0.1:9621
  stream-path: /query/stream
  query-mode: mix
  response-type: Multiple Paragraphs
  include-references: true
  connect-timeout: 5s
  request-timeout: 120s

digital-human:
  intent:
    commands:
      - name: move.forward
        label: 向前
        aliases:
          - 向前
          - 请向前
          - 向前吧
          - 往前走
          - 前进
          - 往前
          - 前走
      - name: turn.left
        label: 向左
        aliases:
          - 向左
          - 向左转
          - 左转
          - 往左
          - 往左转
          - 向坐
      - name: turn.right
        label: 向右
        aliases:
          - 向右
          - 向右转
          - 右转
          - 往右
          - 往右转
      - name: video.open
        label: 打开视频
        aliases:
          - 打开视频
          - 开启视频
          - 显示视频
      - name: tts.stop
        label: 停止播报
        aliases:
          - 停
          - 停止
          - 别说了
          - 不用说了
          - 不用读了
          - 不要说了
          - 停止播报
          - 停止朗读
          - stop
          - Stop
          - STOP
      - name: music.stop
        label: 停止播放
        aliases:
          - 停止播放
          - 暂停播放
          - 关闭音乐
          - 停止音乐

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  group-configs:
    - group: runtime
      display-name: 数字人运行时
      paths-to-match: /api/runtime/**
      packages-to-scan: com.openlinkhub.digitalhuman.runtime.api.rest

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 接口模型
